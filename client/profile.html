<!DOCTYPE html>
<html lang="en" data-mode="dark">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>HabitQuest — Profile</title>
    <script>
        (function(){try{const p=JSON.parse(localStorage.getItem('hq-prefs')||'{}'),h=document.documentElement;if(p.mode)h.setAttribute('data-mode',p.mode);if(p.theme)h.setAttribute('data-theme',p.theme);const BG={default:'linear-gradient(135deg,#111016,#1a1020)',space:'linear-gradient(135deg,#0a0f1e,#0d1830)',forest:'linear-gradient(135deg,#0a1a10,#0d2818)',dusk:'linear-gradient(135deg,#180820,#100018)',steel:'linear-gradient(135deg,#0e1220,#141a2e)',crimson:'linear-gradient(135deg,#180808,#220d0d)'};const BGL={default:'linear-gradient(135deg,#f5f0eb,#ede4d8)',space:'linear-gradient(135deg,#e8f0f5,#d8e8f0)',forest:'linear-gradient(135deg,#e8f5ee,#d8f0e4)',dusk:'linear-gradient(135deg,#f0e8f5,#e8d8f0)',steel:'linear-gradient(135deg,#eaedf5,#d8dced)',crimson:'linear-gradient(135deg,#f5e8e8,#f0d8d8)'};if(p.bg){const isL=p.mode==='light';const g=(isL?BGL:BG)[p.bg]||(isL?BGL.default:BG.default);h.style.background=g;h.style.backgroundAttachment='fixed';h.style.setProperty('--bg-gradient',g);}if(p.accent){const c=p.accent,r=parseInt(c.slice(1,3),16),g2=parseInt(c.slice(3,5),16),b=parseInt(c.slice(5,7),16);h.style.setProperty('--accent',c);h.style.setProperty('--accent-rgb',`${r},${g2},${b}`);h.style.setProperty('--accent-dim',`rgba(${r},${g2},${b},0.12)`);h.style.setProperty('--accent-border',`rgba(${r},${g2},${b},0.25)`);h.style.setProperty('--accent-glow',`rgba(${r},${g2},${b},0.4)`);}}catch(e){}})();
    </script>
    <link rel="stylesheet" href="css/profile.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Jersey+25&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
</head>
<body>
    <header class="app-header">
        <div class="header-left">
            <div class="back-btn" onclick="window.location.href='dashboard.html'">
                <i class="fa-solid fa-chevron-left"></i>
            </div>
            <div class="app-logo">HabitQuest</div>
        </div>
        <div class="page-title">PROFILE</div>
        <div class="header-right">
            <button class="edit-toggle-btn" id="edit-toggle-btn" onclick="toggleEdit()">
                <i class="fa-solid fa-pen" id="edit-icon"></i>
                <span id="edit-label">EDIT</span>
            </button>
        </div>
    </header>

    <div class="page-body">

        <!-- LEFT: Avatar + Bio + XP -->
        <div class="col col-left">
            <!-- IDENTITY CARD -->
            <div class="card identity-card">
                <div class="avatar-section">
                    <div class="avatar-ring">
                        <div class="avatar-circle" id="avatar-display">
                            <i class="fa-solid fa-user" id="avatar-icon"></i>
                            <img id="avatar-img" src="" alt="" style="display:none"/>
                        </div>
                        <div class="avatar-edit-overlay" id="avatar-edit-overlay" onclick="triggerAvatarUpload()" style="display:none">
                            <i class="fa-solid fa-camera"></i>
                        </div>
                    </div>
                    <input type="file" id="avatar-file-input" accept="image/*" style="display:none" onchange="handleAvatarUpload(event)"/>
                    <div class="level-badge" id="level-badge">⚔ LVL 1</div>
                </div>
                <div class="username-section">
                    <div class="username-display" id="username-display">PLAYER</div>
                    <input class="username-input" id="username-input" type="text" placeholder="Username" style="display:none" maxlength="20"/>
                </div>
                <div class="bio-section">
                    <div class="bio-display" id="bio-display">No bio yet. Click EDIT to add one.</div>
                    <textarea class="bio-input" id="bio-input" placeholder="Write something about yourself..." style="display:none" maxlength="120"></textarea>
                    <div class="bio-counter" id="bio-counter" style="display:none">0 / 120</div>
                </div>
                <button class="save-profile-btn" id="save-profile-btn" onclick="saveProfile()" style="display:none">
                    <i class="fa-solid fa-check"></i> SAVE CHANGES
                </button>
            </div>

            <!-- XP CARD -->
            <div class="card xp-card">
                <div class="card-hdr"><i class="fa-solid fa-bolt"></i> XP PROGRESS</div>
                <div class="xp-level-row">
                    <span class="xp-level-text" id="xp-level-text">LEVEL 1</span>
                    <span class="xp-next-text" id="xp-next-text">LEVEL 2 →</span>
                </div>
                <div class="xp-track"><div class="xp-fill" id="xp-fill"></div></div>
                <div class="xp-numbers" id="xp-numbers">0 / 500 XP</div>
            </div>
        </div>

        <!-- RIGHT: Stats + Badges -->
        <div class="col col-right">
            <!-- STATS CARD -->
            <div class="card stats-card">
                <div class="card-hdr"><i class="fa-solid fa-chart-line"></i> STATS</div>
                <div class="stats-grid">
                    <div class="stat-box"><div class="stat-val" id="s-habits">0</div><div class="stat-lbl">HABITS</div></div>
                    <div class="stat-box"><div class="stat-val" id="s-streak">0</div><div class="stat-lbl">DAY STREAK</div></div>
                    <div class="stat-box"><div class="stat-val" id="s-badges">0</div><div class="stat-lbl">BADGES</div></div>
                    <div class="stat-box"><div class="stat-val" id="s-focus">0h</div><div class="stat-lbl">FOCUS TIME</div></div>
                    <div class="stat-box"><div class="stat-val" id="s-longest">0</div><div class="stat-lbl">BEST STREAK</div></div>
                    <div class="stat-box"><div class="stat-val" id="s-level">1</div><div class="stat-lbl">LEVEL</div></div>
                </div>
            </div>
            <!-- BADGES CARD -->
            <div class="card badges-card">
                <div class="card-hdr"><i class="fa-solid fa-medal"></i> BADGES EARNED</div>
                <div class="badges-inner" id="badges-grid"></div>
            </div>
        </div>

    </div>

    <script src="js/profile.js" type="module"></script>
</body>
</html>
