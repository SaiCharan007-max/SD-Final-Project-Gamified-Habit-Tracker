<!DOCTYPE html>
<html lang="en" data-mode="dark">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>HabitQuest — Stats</title>
    <script>
        (function(){try{const p=JSON.parse(localStorage.getItem('hq-prefs')||'{}'),h=document.documentElement;if(p.mode)h.setAttribute('data-mode',p.mode);if(p.theme)h.setAttribute('data-theme',p.theme);const BG={default:'linear-gradient(135deg,#111016,#1a1020)',space:'linear-gradient(135deg,#0a0f1e,#0d1830)',forest:'linear-gradient(135deg,#0a1a10,#0d2818)',dusk:'linear-gradient(135deg,#180820,#100018)',steel:'linear-gradient(135deg,#0e1220,#141a2e)',crimson:'linear-gradient(135deg,#180808,#220d0d)'};const BGL={default:'linear-gradient(135deg,#f5f0eb,#ede4d8)',space:'linear-gradient(135deg,#e8f0f5,#d8e8f0)',forest:'linear-gradient(135deg,#e8f5ee,#d8f0e4)',dusk:'linear-gradient(135deg,#f0e8f5,#e8d8f0)',steel:'linear-gradient(135deg,#eaedf5,#d8dced)',crimson:'linear-gradient(135deg,#f5e8e8,#f0d8d8)'};if(p.bg){const isL=p.mode==='light';const g=(isL?BGL:BG)[p.bg]||(isL?BGL.default:BG.default);h.style.background=g;h.style.backgroundAttachment='fixed';h.style.setProperty('--bg-gradient',g);}if(p.accent){const c=p.accent,r=parseInt(c.slice(1,3),16),g2=parseInt(c.slice(3,5),16),b=parseInt(c.slice(5,7),16);h.style.setProperty('--accent',c);h.style.setProperty('--accent-rgb',`${r},${g2},${b}`);h.style.setProperty('--accent-dim',`rgba(${r},${g2},${b},0.12)`);h.style.setProperty('--accent-border',`rgba(${r},${g2},${b},0.25)`);h.style.setProperty('--accent-glow',`rgba(${r},${g2},${b},0.4)`);}}catch(e){}})();
    </script>
    <link rel="stylesheet" href="css/stats.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Jersey+25&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
</head>
<body>
    <header class="app-header">
        <div class="header-left">
            <div class="back-btn" onclick="window.location.href='dashboard.html'">
                <i class="fa-solid fa-chevron-left"></i>
            </div>
            <div class="app-logo">HabitQuest</div>
        </div>
        <div class="page-title">STATS</div>
        <div class="header-right"></div>
    </header>

    <div class="page-body">
        <!-- LEFT COL -->
        <div class="col col-left">
            <!-- XP CARD -->
            <div class="card xp-card">
                <div class="card-hdr"><i class="fa-solid fa-bolt"></i> XP &amp; LEVEL</div>
                <div class="xp-inner">
                    <div class="xp-ring-wrap">
                        <svg class="xp-svg" viewBox="0 0 120 120">
                            <circle class="ring-bg"   cx="60" cy="60" r="50"/>
                            <circle class="ring-fill" cx="60" cy="60" r="50" id="xp-ring-fill"/>
                        </svg>
                        <div class="xp-ring-center">
                            <div class="xp-ring-val" id="xp-val">0</div>
                            <div class="xp-ring-lbl">XP</div>
                        </div>
                    </div>
                    <div class="xp-details">
                        <div class="xp-lvl-badge" id="xp-lvl-badge">LVL 1</div>
                        <div class="xp-title-txt" id="xp-title">NOVICE</div>
                        <div class="xp-track"><div class="xp-fill" id="xp-bar"></div></div>
                        <div class="xp-sub" id="xp-sub">0 / 500 XP</div>
                        <div class="xp-next" id="xp-next">500 XP TO LEVEL 2</div>
                    </div>
                </div>
            </div>
            <!-- OVERVIEW -->
            <div class="card ov-card">
                <div class="card-hdr"><i class="fa-solid fa-chart-line"></i> OVERVIEW</div>
                <div class="ov-grid">
                    <div class="ov-item"><div class="ov-val" id="ov-streak">0</div><div class="ov-lbl">STREAK</div></div>
                    <div class="ov-item"><div class="ov-val" id="ov-longest">0</div><div class="ov-lbl">LONGEST</div></div>
                    <div class="ov-item"><div class="ov-val" id="ov-habits">0</div><div class="ov-lbl">HABITS</div></div>
                    <div class="ov-item"><div class="ov-val" id="ov-focus">0h</div><div class="ov-lbl">FOCUS</div></div>
                    <div class="ov-item"><div class="ov-val" id="ov-badges">0</div><div class="ov-lbl">BADGES</div></div>
                    <div class="ov-item"><div class="ov-val" id="ov-days">0</div><div class="ov-lbl">DAYS ACTIVE</div></div>
                </div>
            </div>
            <!-- BADGES -->
            <div class="card badges-card">
                <div class="card-hdr"><i class="fa-solid fa-medal"></i> BADGES <span class="pill" id="badge-pill">0/8</span></div>
                <div class="badges-inner" id="badges-grid"></div>
            </div>
        </div>

        <!-- RIGHT COL -->
        <div class="col col-right">
            <!-- HABIT CHART -->
            <div class="card chart-card">
                <div class="card-hdr"><i class="fa-solid fa-list-check"></i> HABITS — 7 DAYS</div>
                <div class="chart-wrap"><canvas id="habit-chart"></canvas></div>
            </div>
            <!-- FOCUS CHART -->
            <div class="card chart-card">
                <div class="card-hdr"><i class="fa-solid fa-brain"></i> FOCUS — 7 DAYS (MIN)</div>
                <div class="chart-wrap"><canvas id="focus-chart"></canvas></div>
            </div>
            <!-- STREAK CALENDAR -->
            <div class="card cal-card">
                <div class="card-hdr">
                    <i class="fa-solid fa-fire"></i> STREAK CALENDAR
                    <span class="streak-badge" id="streak-badge">0 🔥</span>
                </div>
                <div class="cal-grid" id="cal-grid"></div>
                <div class="cal-legend">
                    <div class="cal-leg"><div class="cal-dot miss"></div>MISSED</div>
                    <div class="cal-leg"><div class="cal-dot done"></div>DONE</div>
                    <div class="cal-leg"><div class="cal-dot tod"></div>TODAY</div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/stats.js" type="module"></script>
</body>
</html>
