<!DOCTYPE html>
<html lang="en" data-mode="dark">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>HabitQuest — Achievements</title>
    <script>
        (function(){try{const p=JSON.parse(localStorage.getItem('hq-prefs')||'{}'),h=document.documentElement;if(p.mode)h.setAttribute('data-mode',p.mode);if(p.theme)h.setAttribute('data-theme',p.theme);const BG={default:'linear-gradient(135deg,#111016,#1a1020)',space:'linear-gradient(135deg,#0a0f1e,#0d1830)',forest:'linear-gradient(135deg,#0a1a10,#0d2818)',dusk:'linear-gradient(135deg,#180820,#100018)',steel:'linear-gradient(135deg,#0e1220,#141a2e)',crimson:'linear-gradient(135deg,#180808,#220d0d)'};const BGL={default:'linear-gradient(135deg,#f5f0eb,#ede4d8)',space:'linear-gradient(135deg,#e8f0f5,#d8e8f0)',forest:'linear-gradient(135deg,#e8f5ee,#d8f0e4)',dusk:'linear-gradient(135deg,#f0e8f5,#e8d8f0)',steel:'linear-gradient(135deg,#eaedf5,#d8dced)',crimson:'linear-gradient(135deg,#f5e8e8,#f0d8d8)'};if(p.bg){const isL=p.mode==='light';const g=(isL?BGL:BG)[p.bg]||(isL?BGL.default:BG.default);h.style.background=g;h.style.backgroundAttachment='fixed';h.style.setProperty('--bg-gradient',g);}if(p.accent){const c=p.accent,r=parseInt(c.slice(1,3),16),g2=parseInt(c.slice(3,5),16),b=parseInt(c.slice(5,7),16);h.style.setProperty('--accent',c);h.style.setProperty('--accent-rgb',`${r},${g2},${b}`);h.style.setProperty('--accent-dim',`rgba(${r},${g2},${b},0.12)`);h.style.setProperty('--accent-border',`rgba(${r},${g2},${b},0.25)`);h.style.setProperty('--accent-glow',`rgba(${r},${g2},${b},0.4)`);}}catch(e){}})();
    </script>
    <link rel="stylesheet" href="css/achievements.css"/>
    <link rel="stylesheet" href="css/main.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Jersey+25&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
</head>
<body>

    <header class="app-header">
        <div class="header-left">
            <div class="back-btn" onclick="window.location.href='dashboard.html'">
                <i class="fa-solid fa-chevron-left"></i>
            </div>
            <div class="app-logo">HabitQuest</div>
        </div>
        <div class="page-title">ACHIEVEMENTS</div>
        <div class="header-right">
            <div class="total-badge" id="total-badge">0 / 0</div>
        </div>
    </header>

    <!-- SUMMARY ROW -->
    <div class="summary-row">
        <div class="summary-item">
            <span class="summary-val" id="sum-earned">0</span>
            <span class="summary-lbl">EARNED</span>
        </div>
        <div class="summary-item">
            <span class="summary-val" id="sum-locked">0</span>
            <span class="summary-lbl">LOCKED</span>
        </div>
        <div class="summary-item">
            <span class="summary-val" id="sum-pct">0%</span>
            <span class="summary-lbl">COMPLETE</span>
        </div>
        <div class="summary-item">
            <span class="summary-val" id="sum-xp">0</span>
            <span class="summary-lbl">BONUS XP</span>
        </div>
    </div>

    <!-- OVERALL PROGRESS BAR -->
    <div class="overall-progress">
        <div class="overall-bar-wrap">
            <div class="overall-bar-fill" id="overall-bar" style="width:0%"></div>
        </div>
    </div>

    <!-- FILTER TABS -->
    <div class="filter-bar">
        <button class="filter-btn active" data-f="all"      onclick="setFilter('all')">ALL</button>
        <button class="filter-btn" data-f="earned"   onclick="setFilter('earned')">✅ EARNED</button>
        <button class="filter-btn" data-f="locked"   onclick="setFilter('locked')">🔒 LOCKED</button>
        <button class="filter-btn" data-f="xp"       onclick="setFilter('xp')">⚡ XP</button>
        <button class="filter-btn" data-f="streak"   onclick="setFilter('streak')">🔥 STREAK</button>
        <button class="filter-btn" data-f="habit"    onclick="setFilter('habit')">🌱 HABITS</button>
    </div>

    <!-- GRID -->
    <div class="achievements-grid" id="achievements-grid"></div>

    <!-- DETAIL MODAL -->
    <div class="modal-overlay" id="detail-modal">
        <div class="modal-box">
            <div class="modal-icon" id="m-icon"></div>
            <div class="modal-name" id="m-name"></div>
            <div class="modal-desc" id="m-desc"></div>
            <div class="modal-status" id="m-status"></div>
            <div class="modal-progress-wrap" id="m-progress-wrap">
                <div class="modal-prog-bar-wrap">
                    <div class="modal-prog-fill" id="m-prog-fill"></div>
                </div>
                <div class="modal-prog-label" id="m-prog-label"></div>
            </div>
            <button class="modal-close-btn" onclick="closeDetail()">CLOSE</button>
        </div>
    </div>

    <script src="js/achievements.js"></script>
</body>
</html>
